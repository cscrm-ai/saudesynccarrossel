squad:
  name: saude-sync-content-v2
  description: >
    Produz carrosséis para o Instagram (@app.saudesync) sobre o Saúde Sync —
    seus recursos, benefícios e educação em saúde — voltados para pacientes e
    profissionais da saúde. Pautas extraídas dos documentos internos do projeto.
    Foco total em carrossel para Instagram Feed com imagens geradas via Imagen.
  version: "1.0.0"
  created: "2026-03-20"
  updated: "2026-03-20"
  mission: >
    Transformar funcionalidades, valores e posicionamento da Saúde Sync em
    carrosséis de alto engajamento com imagens geradas por IA, fortalecendo
    o posicionamento de "continuidade de cuidado" com segurança regulatória.

  skills:
    - web_fetch
    - nanobana
    - instagram-publisher
    - blotato
    - image-creator

  data_files:
    - pipeline/data/tone-of-voice.md
    - pipeline/data/domain-framework.md
    - pipeline/data/quality-criteria.md
    - pipeline/data/anti-patterns.md
    - pipeline/data/output-examples.md
    - pipeline/data/research-brief.md

  agents:
    - id: paulo-pauta
      file: agents/paulo-pauta/paulo-pauta.agent.md
      execution: subagent
      tasks:
        - agents/paulo-pauta/tasks/read-brand-docs.md
        - agents/paulo-pauta/tasks/extract-topics.md
        - agents/paulo-pauta/tasks/propose-pautas.md

    - id: igor-ideia
      file: agents/igor-ideia/igor-ideia.agent.md
      execution: subagent
      tasks:
        - agents/igor-ideia/tasks/generate-angles.md

    - id: leo-legenda
      file: agents/leo-legenda/leo-legenda.agent.md
      execution: subagent
      tasks:
        - agents/leo-legenda/tasks/create-copy.md

    - id: carlos-carrossel
      file: agents/carlos-carrossel/carlos-carrossel.agent.md
      execution: subagent
      tasks:
        - agents/carlos-carrossel/tasks/create-carousel.md
        - agents/carlos-carrossel/tasks/optimize-carousel.md

    - id: carla-compliance
      file: agents/carla-compliance/carla-compliance.agent.md
      execution: inline
      tasks:
        - agents/carla-compliance/tasks/check-claims.md
        - agents/carla-compliance/tasks/flag-issues.md

    - id: marco-mapa-visual
      file: agents/marco-mapa-visual/marco-mapa-visual.agent.md
      execution: inline
      tasks:
        - agents/marco-mapa-visual/tasks/map-visuals.md

    - id: isa-ilustra
      file: agents/isa-ilustra/isa-ilustra.agent.md
      execution: subagent
      tasks:
        - agents/isa-ilustra/tasks/generate-illustrations.md

    - id: pedro-persona
      file: agents/pedro-persona/pedro-persona.agent.md
      execution: subagent
      tasks:
        - agents/pedro-persona/tasks/generate-people.md

    - id: icaro-icone
      file: agents/icaro-icone/icaro-icone.agent.md
      execution: subagent
      tasks:
        - agents/icaro-icone/tasks/generate-icons.md

    - id: bruno-base
      file: agents/bruno-base/bruno-base.agent.md
      execution: subagent
      tasks:
        - agents/bruno-base/tasks/generate-backgrounds.md

    - id: daniela-design
      file: agents/daniela-design/daniela-design.agent.md
      execution: inline
      tasks:
        - agents/daniela-design/tasks/design-slides.md
        - agents/daniela-design/tasks/render-images.md

    - id: victor-veredicto
      file: agents/victor-veredicto/victor-veredicto.agent.md
      execution: inline
      tasks:
        - agents/victor-veredicto/tasks/score-content.md
        - agents/victor-veredicto/tasks/generate-feedback.md

    - id: bruna-broadcast
      file: agents/bruna-broadcast/bruna-broadcast.agent.md
      execution: inline
      tasks:
        - agents/bruna-broadcast/tasks/prepare-assets.md
        - agents/bruna-broadcast/tasks/publish-platforms.md

    - id: ana-analytics
      file: agents/ana-analytics/ana-analytics.agent.md
      execution: inline
      tasks:
        - agents/ana-analytics/tasks/collect-metrics.md
        - agents/ana-analytics/tasks/generate-insights.md

  pipeline:
    entry: pipeline/pipeline.yaml
    steps_dir: pipeline/steps/
    data_dir: pipeline/data/
    output_dir: output/
    memory_file: _memory/memories.md

  interaction:
    channel: terminal
    telegram:
      notify_on_step: true
      send_album: true
      timeout_reminder: 4h
      timeout_pause: 8h
