<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, initial-scale=1">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=DM+Sans:wght@500&family=JetBrains+Mono:wght@600&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1350px; overflow: hidden;
  font-family: 'DM Sans', sans-serif; font-weight: 500;
  background: #0A0E17; color: #F0F2F5;
  position: relative;
}
.content {
  padding: 72px 64px;
  display: flex; flex-direction: column;
  height: 100%;
}
h1 {
  font-family: 'Space Grotesk', sans-serif; font-weight: 700;
  font-size: 88px; line-height: 1.12;
  margin-bottom: 32px;
}
h1 .green { color: #00E08E; }
.body-text {
  font-size: 40px; line-height: 1.65;
  margin-bottom: 56px;
}
.chart-area {
  flex: 1; display: flex; flex-direction: column; gap: 32px;
}
.line-chart {
  background: #0D1420; border-radius: 20px; padding: 32px;
  flex: 1; position: relative; overflow: hidden;
}
.line-chart svg { width: 100%; height: 100%; }
.metrics {
  display: flex; gap: 24px;
}
.metric-card {
  flex: 1; background: #0D1420; border-radius: 16px;
  padding: 28px 24px; text-align: center;
  border-top: 4px solid;
}
.metric-card.green-border { border-color: #00E08E; }
.metric-card.blue-border { border-color: #00A3FF; }
.metric-card.gold-border { border-color: #F5B800; }
.metric-label {
  font-size: 28px; color: #6B7A8D; margin-bottom: 8px;
}
.metric-value {
  font-family: 'JetBrains Mono', monospace; font-weight: 600;
  font-size: 42px;
}
.metric-card.green-border .metric-value { color: #00E08E; }
.metric-card.blue-border .metric-value { color: #00A3FF; }
.metric-card.gold-border .metric-value { color: #F5B800; }
</style>
</head>
<body>
<div class="content">
  <h1>Seu histórico na <span class="green">palma da mão.</span></h1>
  <div class="body-text">
    Gráficos claros que mostram<br>
    sua evolução semana a semana.<br>
    Leve para sua próxima consulta.
  </div>
  <div class="chart-area">
    <div class="line-chart">
      <svg viewBox="0 0 800 200" preserveAspectRatio="none">
        <defs>
          <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#00A3FF" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="#00A3FF" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <path d="M0,160 Q100,140 200,120 T400,80 T600,60 T800,30" fill="none" stroke="#00A3FF" stroke-width="4"/>
        <path d="M0,160 Q100,140 200,120 T400,80 T600,60 T800,30 L800,200 L0,200 Z" fill="url(#lineGrad)"/>
        <path d="M0,120 Q100,130 200,100 T400,110 T600,90 T800,70" fill="none" stroke="#00E08E" stroke-width="3" stroke-dasharray="8,6"/>
        <circle cx="200" cy="120" r="8" fill="#00A3FF"/>
        <circle cx="400" cy="80" r="8" fill="#00A3FF"/>
        <circle cx="600" cy="60" r="8" fill="#00A3FF"/>
        <circle cx="800" cy="30" r="8" fill="#00A3FF"/>
      </svg>
    </div>
    <div class="metrics">
      <div class="metric-card green-border">
        <div class="metric-label">Pressão</div>
        <div class="metric-value">120/80</div>
      </div>
      <div class="metric-card blue-border">
        <div class="metric-label">FC</div>
        <div class="metric-value">72bpm</div>
      </div>
      <div class="metric-card gold-border">
        <div class="metric-label">Peso</div>
        <div class="metric-value">estável</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
