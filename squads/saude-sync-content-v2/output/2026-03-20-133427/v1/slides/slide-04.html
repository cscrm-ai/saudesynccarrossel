<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, initial-scale=1">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=DM+Sans:wght@500&family=JetBrains+Mono:wght@600&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1350px; overflow: hidden;
  font-family: 'DM Sans', sans-serif; font-weight: 500;
  color: #F0F2F5; position: relative;
}
.bg-img {
  position: absolute; inset: 0;
  background: url('../generated-images/bruno-base/slide-04-bruno.png') center center / cover no-repeat;
}
.overlay {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(10,14,23,0.7) 0%, rgba(10,14,23,0.8) 100%);
}
.content {
  position: relative; z-index: 2;
  padding: 72px 64px;
  display: flex; flex-direction: column;
  justify-content: center;
  height: 100%;
}
h1 {
  font-family: 'Space Grotesk', sans-serif; font-weight: 700;
  font-size: 92px; line-height: 1.12;
  margin-bottom: 56px;
}
.body-text {
  font-size: 44px; line-height: 1.65;
  color: #F0F2F5;
}
</style>
</head>
<body>
<div class="bg-img"></div>
<div class="overlay"></div>
<div class="content">
  <h1>E se você não precisasse esperar?</h1>
  <div class="body-text">
    Imagine ter seu médico<br>
    a um toque de distância —<br>
    todos os dias.
  </div>
</div>
</body>
</html>
