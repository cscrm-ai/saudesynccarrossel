<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, initial-scale=1">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=DM+Sans:wght@500&family=JetBrains+Mono:wght@600&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1350px; overflow: hidden;
  font-family: 'DM Sans', sans-serif; font-weight: 500;
  background: #0A0E17; color: #F0F2F5;
  position: relative;
}
.bg-img {
  position: absolute; inset: 0;
  background: url('../generated-images/bruno-base/slide-10-bruno.png') center center / cover no-repeat;
  opacity: 0.2;
}
.radial-glow {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, rgba(0,163,255,0.12) 0%, transparent 70%);
}
.overlay {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(10,14,23,0.6) 0%, rgba(10,14,23,0.85) 100%);
}
.content {
  position: relative; z-index: 2;
  padding: 72px 64px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center;
  height: 100%;
  gap: 24px;
}
.tagline-fade {
  font-family: 'Space Grotesk', sans-serif; font-weight: 700;
  font-size: 72px; line-height: 1.2;
  color: #6B7A8D;
}
.tagline-bold {
  font-family: 'Space Grotesk', sans-serif; font-weight: 700;
  font-size: 80px; line-height: 1.2;
  color: #00E08E;
  margin-bottom: 32px;
}
.logo-area {
  margin-bottom: 40px;
}
.logo-text {
  font-family: 'Space Grotesk', sans-serif; font-weight: 700;
  font-size: 72px; color: #00A3FF;
  letter-spacing: -1px;
}
.logo-sub {
  font-size: 28px; color: #6B7A8D; margin-top: 8px;
}
.cta-btn {
  display: inline-block;
  background: #00A3FF;
  color: #0A0E17;
  font-family: 'Space Grotesk', sans-serif; font-weight: 700;
  font-size: 40px;
  padding: 28px 64px;
  border-radius: 16px;
  text-decoration: none;
  letter-spacing: 0.5px;
}
.cta-arrow { margin-left: 12px; }
</style>
</head>
<body>
<div class="bg-img"></div>
<div class="overlay"></div>
<div class="radial-glow"></div>
<div class="content">
  <div class="tagline-fade">A consulta acaba.</div>
  <div class="tagline-bold">O cuidado continua.</div>
  <div class="logo-area">
    <div class="logo-text">Saúde Sync</div>
    <div class="logo-sub">Seu cuidado contínuo</div>
  </div>
  <div class="cta-btn">Acesse agora <span class="cta-arrow">&rarr;</span> Link na bio</div>
</div>
</body>
</html>
