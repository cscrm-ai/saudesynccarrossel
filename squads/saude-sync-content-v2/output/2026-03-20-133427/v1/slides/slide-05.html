<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, initial-scale=1">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=DM+Sans:wght@500&family=JetBrains+Mono:wght@600&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1350px; overflow: hidden;
  font-family: 'DM Sans', sans-serif; font-weight: 500;
  background: #0D1420; color: #F0F2F5;
  position: relative;
}
.content {
  position: relative; z-index: 2;
  padding: 72px 64px;
  display: flex; flex-direction: column;
  height: 100%;
}
h1 {
  font-family: 'Space Grotesk', sans-serif; font-weight: 700;
  font-size: 88px; line-height: 1.12;
  margin-bottom: 40px;
}
h1 .blue { color: #00A3FF; }
.body-text {
  font-size: 40px; line-height: 1.65;
  margin-bottom: 48px;
}
.img-container {
  flex: 1; display: flex; align-items: center; justify-content: center;
}
.img-container img {
  max-height: 50%; max-width: 100%; object-fit: contain;
  border-radius: 16px;
}
.isa-img {
  width: 100%; flex: 1;
  background: url('../generated-images/isa-ilustra/slide-05-isa.png') center center / contain no-repeat;
}
</style>
</head>
<body>
<div class="content">
  <h1><span class="blue">Saúde Sync</span>: seu cuidado contínuo.</h1>
  <div class="body-text">
    Monitore seus sinais vitais todo dia.<br>
    Pressão, peso, glicose, frequência cardíaca.<br>
    Tudo registrado. Tudo visível.
  </div>
  <div class="isa-img"></div>
</div>
</body>
</html>
