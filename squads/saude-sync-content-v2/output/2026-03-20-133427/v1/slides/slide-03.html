<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, initial-scale=1">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=DM+Sans:wght@500&family=JetBrains+Mono:wght@600&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1350px; overflow: hidden;
  font-family: 'DM Sans', sans-serif; font-weight: 500;
  color: #F0F2F5; position: relative;
}
.bg-img {
  position: absolute; inset: 0;
  background: url('../generated-images/bruno-base/slide-03-bruno.png') center center / cover no-repeat;
}
.overlay {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(10,14,23,0.75) 0%, rgba(10,14,23,0.85) 100%);
}
.content {
  position: relative; z-index: 2;
  padding: 72px 64px;
  display: flex; flex-direction: column;
  justify-content: center;
  height: 100%;
}
h1 {
  font-family: 'Space Grotesk', sans-serif; font-weight: 700;
  font-size: 88px; line-height: 1.12;
  margin-bottom: 56px;
}
h1 .red { color: #FF4455; }
.thoughts {
  font-size: 40px; line-height: 1.7;
  color: #6B7A8D; font-style: italic;
}
.thoughts .line { margin-bottom: 12px; }
</style>
</head>
<body>
<div class="bg-img"></div>
<div class="overlay"></div>
<div class="content">
  <h1>A <span class="red">ansiedade</span> não espera o médico.</h1>
  <div class="thoughts">
    <div class="line">A dúvida aparece às 23h.</div>
    <div class="line">Minha pressão está alta ou é nervoso?</div>
    <div class="line">Preciso ir ao pronto-socorro?</div>
  </div>
</div>
</body>
</html>
