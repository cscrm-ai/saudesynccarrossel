<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, initial-scale=1">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=DM+Sans:wght@500&family=JetBrains+Mono:wght@600&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1350px; overflow: hidden;
  font-family: 'DM Sans', sans-serif; font-weight: 500;
  background: #0A0E17; color: #F0F2F5;
  position: relative;
}
.bg-img {
  position: absolute; inset: 0;
  background: url('../generated-images/isa-ilustra/slide-01-isa.png') center center / cover no-repeat;
  opacity: 0.25;
}
.content {
  position: relative; z-index: 2;
  padding: 72px 64px;
  display: flex; flex-direction: column;
  height: 100%;
}
.headline-area {
  display: flex; align-items: center; justify-content: center;
  flex: 0 0 50%;
}
h1 {
  font-family: 'Space Grotesk', sans-serif; font-weight: 700;
  font-size: 92px; line-height: 1.12;
  text-align: center; max-width: 900px;
}
h1 .red { color: #FF4455; }
.spacer { flex: 1; }
.logo {
  position: absolute; bottom: 72px; right: 64px;
  opacity: 0.6; font-family: 'Space Grotesk', sans-serif;
  font-weight: 700; font-size: 32px; color: #00A3FF;
}
</style>
</head>
<body>
<div class="bg-img"></div>
<div class="content">
  <div class="headline-area">
    <h1>E entre uma consulta e outra, <span class="red">quem</span> te acompanha?</h1>
  </div>
</div>
<div class="logo">Saúde Sync</div>
</body>
</html>
