<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=DM+Sans:wght@500&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px;
  height: 1350px;
  background: #0A0E17;
  overflow: hidden;
  position: relative;
  font-family: 'DM Sans', sans-serif;
}
.bg-image {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  opacity: 0.2;
  z-index: 0;
}
/* Floating particles */
.particle {
  position: absolute;
  width: 4px; height: 4px;
  background: #00A3FF;
  border-radius: 50%;
  opacity: 0.4;
  z-index: 1;
}
.p1 { top: 15%; left: 20%; width: 6px; height: 6px; opacity: 0.6; }
.p2 { top: 30%; right: 15%; width: 3px; height: 3px; }
.p3 { top: 45%; left: 10%; width: 5px; height: 5px; opacity: 0.5; }
.p4 { top: 60%; right: 25%; width: 4px; height: 4px; }
.p5 { top: 75%; left: 30%; width: 3px; height: 3px; opacity: 0.3; }
.p6 { top: 20%; right: 35%; width: 5px; height: 5px; opacity: 0.35; }
.p7 { top: 85%; left: 15%; width: 4px; height: 4px; opacity: 0.25; }
.p8 { top: 50%; right: 10%; width: 6px; height: 6px; opacity: 0.45; }
.p9 { top: 10%; left: 50%; width: 3px; height: 3px; opacity: 0.3; }
.p10 { top: 70%; right: 40%; width: 5px; height: 5px; opacity: 0.35; }
.p11 { top: 35%; left: 40%; width: 4px; height: 4px; opacity: 0.2; }
.p12 { top: 90%; right: 20%; width: 3px; height: 3px; opacity: 0.4; }

.glow {
  position: absolute;
  top: 25%; left: 50%;
  transform: translateX(-50%);
  width: 500px; height: 300px;
  background: radial-gradient(circle, rgba(0,163,255,0.12) 0%, transparent 70%);
  z-index: 1;
}
.content {
  position: relative;
  z-index: 2;
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 72px;
  text-align: center;
}
.logo {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 56px;
  color: #00A3FF;
  margin-bottom: 56px;
  text-shadow: 0 0 30px rgba(0,163,255,0.3);
  letter-spacing: 2px;
}
.headline {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 92px;
  line-height: 1.1;
  color: #FFFFFF;
}
.headline .highlight {
  color: #00A3FF;
}
.body-text {
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  font-size: 44px;
  color: #FFFFFF;
  margin-top: 48px;
  line-height: 1.4;
}
.body-text .days {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  font-size: 48px;
  color: #00E08E;
}
.cta-button {
  margin-top: 56px;
  background: #00A3FF;
  color: #FFFFFF;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 40px;
  padding: 24px 64px;
  border-radius: 12px;
  display: inline-block;
  box-shadow: 0 8px 32px rgba(0,163,255,0.3);
}
.link-bio {
  margin-top: 32px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  font-size: 40px;
  color: #00A3FF;
}
.arrow-down {
  margin-top: 16px;
  font-size: 40px;
  color: #00A3FF;
  opacity: 0.7;
}
</style>
</head>
<body>
  <img class="bg-image" src="http://localhost:8787/squads/saude-sync-content-v2/output/2026-03-23-130500/v1/generated-images/bruno-base/slide-10-bruno.png" alt="bg">
  <div class="particle p1"></div>
  <div class="particle p2"></div>
  <div class="particle p3"></div>
  <div class="particle p4"></div>
  <div class="particle p5"></div>
  <div class="particle p6"></div>
  <div class="particle p7"></div>
  <div class="particle p8"></div>
  <div class="particle p9"></div>
  <div class="particle p10"></div>
  <div class="particle p11"></div>
  <div class="particle p12"></div>
  <div class="glow"></div>
  <div class="content">
    <div class="logo">Saúde Sync</div>
    <div class="headline">Quer ver o risco<br><span class="highlight">antes do sintoma</span>?</div>
    <div class="body-text">Teste o Saúde Sync grátis por <span class="days">14 dias</span>.</div>
    <div class="cta-button">Começar agora</div>
    <div class="link-bio">Link na bio</div>
    <div class="arrow-down">&#8595;</div>
  </div>
</body>
</html>
