body {

.bg-image {
  position: absolute;
  top: 0; left: 0;

  opacity: 0.4;
  z-index: 0;

.diagonal-split {
  position: absolute;
  top: 0; left: 0;

  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 80px 72px;
  text-align: center;
}
.bell-icon {
  font-size: 80px;
  margin-bottom: 32px;
  text-shadow: 0 0 40px rgba(0,163,255,0.6);
}
.headline {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 88px;
