<!DOCTYPE html>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {

.content {

}
.headline-area {
  flex: 0 0 auto;
  margin-top: 120px;

}
.headline {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 92px;
  line-height: 1.1;
  color: #FFFFFF;
}
.headline .highlight {

}
.body-text {
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  font-size: 40px;
  color: #8A94A6;

.swipe-hint {

  bottom: 64px;
  right: 72px;

.swipe-arrow {

.brand {

  font-weight: 700;
  font-size: 28px;
  color: #00A3FF;

}
.brand-bottom-right {

  bottom: 120px;
  right: 72px;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 28px;
  color: #00A3FF;
  opacity: 0.8;
}
.overlay-gradient {
  position: absolute;
  bottom: 0; left: 0;
  width: 100%; height: 60%;
  background: linear-gradient(to top, #0A0E17 0%, rgba(10,14,23,0.8) 40%, transparent 100%);

}
.overlay-top {
  position: absolute;
  top: 0; left: 0;

  <img class="bg-image" src="http://localhost:8787/squads/saude-sync-content-v2/output/2026-03-23-130500/v1/generated-images/bruno-base/slide-01-bruno.png" alt="bg">
