<!DOCTYPE html>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {

}
.content {

  flex-direction: column;
  padding: 80px 72px;
}
.headline-area {
  margin-top: 100px;
  text-align: center;
}
.headline {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 88px;
  line-height: 1.1;
  color: #FFFFFF;
}
.headline .highlight {
  color: #F5B800;
}
.body-text {
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  font-size: 40px;
  color: #C0C7D4;
  margin-top: 48px;
  line-height: 1.5;
  text-align: center;
}
.body-text .bold-green {
  font-weight: 700;
  color: #00E08E;
}
</style>
</head>

  <img class="bg-image" src="http://localhost:8787/squads/saude-sync-content-v2/output/2026-03-23-130500/v1/generated-images/bruno-base/slide-09-bruno.png" alt="bg">

</body>
</html>
