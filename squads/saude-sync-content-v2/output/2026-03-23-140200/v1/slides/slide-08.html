<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1350">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=DM+Sans:wght@500&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1350px; overflow: hidden;
  background: #0A0E17; color: #fff;
  font-family: 'DM Sans', sans-serif; font-weight: 500;
  display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
  padding: 300px 70px 70px;
  position: relative;
}
.headline {
  font-family: 'Space Grotesk', sans-serif; font-weight: 700;
  font-size: 76px; line-height: 1.1; text-align: center;
  max-width: 900px; margin-bottom: 50px;
}
.split-screen {
  display: flex; gap: 30px; width: 100%; max-width: 900px;
  align-items: stretch; margin-bottom: 20px;
  position: relative;
}
.screen-card {
  flex: 1; background: #0D1420; border-radius: 24px; padding: 32px 28px;
  display: flex; flex-direction: column;
}
.screen-label {
  font-size: 22px; color: rgba(255,255,255,0.35); text-transform: uppercase;
  letter-spacing: 2px; margin-bottom: 24px; text-align: center;
}
.screen-icon {
  width: 56px; height: 56px; margin: 0 auto 20px;
  display: flex; align-items: center; justify-content: center;
}
.mini-bars {
  display: flex; align-items: flex-end; gap: 5px; height: 100px;
  margin-bottom: 20px;
}
.mini-bar { flex: 1; border-radius: 3px 3px 0 0; background: #00E08E; }
.mini-stat {
  display: flex; justify-content: space-between; padding: 14px 0;
  border-top: 1px solid rgba(255,255,255,0.05);
  font-size: 24px;
}
.mini-stat .label { color: rgba(255,255,255,0.4); }
.mini-stat .val {
  font-family: 'JetBrains Mono', monospace; font-weight: 600;
  color: #00E08E;
}
.connector {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  z-index: 5;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.lock-icon {
  width: 60px; height: 60px; background: rgba(0,224,142,0.15);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  border: 2px solid #00E08E;
}
.lock-icon svg { width: 28px; height: 28px; }
.dotted-line-left, .dotted-line-right {
  position: absolute; top: 50%; height: 3px; width: 60px;
  border-top: 3px dashed #00A3FF;
}
.dotted-line-left { right: 50%; margin-right: 36px; }
.dotted-line-right { left: 50%; margin-left: 36px; }
.permission-badge {
  background: rgba(245,184,0,0.15); color: #F5B800;
  padding: 10px 24px; border-radius: 20px; font-size: 24px;
  text-align: center; margin-top: 30px;
  border: 1px solid rgba(245,184,0,0.3);
}
.body-text {
  font-size: 36px; color: rgba(255,255,255,0.55); text-align: center;
  max-width: 820px; line-height: 1.55; margin-top: 40px;
}
.brand-logo {
  position: absolute;
  top: 24px;
  left: 50%;
  transform: translateX(-50%);
  width: 220px;
  height: auto;
  filter: brightness(2.5) contrast(1.2);
  z-index: 100;
  pointer-events: none;
}
</style>
</head>
<body>
  <img src="../../../../assets/logo-saudesync.svg" class="brand-logo" alt="Saúde Sync">

  <h1 class="headline">Seu médico também vê.</h1>

  <div class="split-screen">
    <div class="screen-card">
      <div class="screen-label">Paciente</div>
      <div class="screen-icon">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <rect x="10" y="4" width="28" height="40" rx="6" stroke="#00A3FF" stroke-width="2.5" fill="none"/>
          <rect x="18" y="38" width="12" height="2" rx="1" fill="#00A3FF" opacity="0.5"/>
        </svg>
      </div>
      <div class="mini-bars">
        <div class="mini-bar" style="height:85%"></div>
        <div class="mini-bar" style="height:90%"></div>
        <div class="mini-bar" style="height:70%"></div>
        <div class="mini-bar" style="height:95%"></div>
        <div class="mini-bar" style="height:60%"></div>
        <div class="mini-bar" style="height:88%"></div>
        <div class="mini-bar" style="height:92%"></div>
      </div>
      <div class="mini-stat"><span class="label">Adesão</span><span class="val">80%</span></div>
      <div class="mini-stat"><span class="label">Doses</span><span class="val">24/30</span></div>
    </div>

    <div class="connector">
      <div class="dotted-line-left"></div>
      <div class="lock-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#00E08E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <div class="dotted-line-right"></div>
    </div>

    <div class="screen-card">
      <div class="screen-label">Médico</div>
      <div class="screen-icon">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <rect x="4" y="8" width="40" height="28" rx="4" stroke="#00A3FF" stroke-width="2.5" fill="none"/>
          <rect x="16" y="36" width="16" height="4" rx="1" fill="#00A3FF" opacity="0.3"/>
          <rect x="12" y="40" width="24" height="2" rx="1" fill="#00A3FF" opacity="0.2"/>
        </svg>
      </div>
      <div class="mini-bars">
        <div class="mini-bar" style="height:85%"></div>
        <div class="mini-bar" style="height:90%"></div>
        <div class="mini-bar" style="height:70%"></div>
        <div class="mini-bar" style="height:95%"></div>
        <div class="mini-bar" style="height:60%"></div>
        <div class="mini-bar" style="height:88%"></div>
        <div class="mini-bar" style="height:92%"></div>
      </div>
      <div class="mini-stat"><span class="label">Adesão</span><span class="val">80%</span></div>
      <div class="mini-stat"><span class="label">Alertas</span><span class="val">3</span></div>
    </div>
  </div>

  <div class="permission-badge">🔐 Com sua permissão</div>

  <p class="body-text">Com sua permissão, o histórico de adesão fica visível para o profissional que te acompanha. Decisões clínicas com base em dados.</p>
</body>
</html>
