<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1350">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=DM+Sans:wght@500&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1350px; overflow: hidden;
  background: #0A0E17; color: #fff;
  font-family: 'DM Sans', sans-serif; font-weight: 500;
  display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
  padding: 300px 80px 80px;
  position: relative;
}
/* Subtle app UI elements in background */
.bg-ui {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  overflow: hidden; opacity: 0.04;
}
.bg-ui .ui-card {
  position: absolute; background: #fff; border-radius: 16px;
}
.bg-ui .c1 { width: 300px; height: 180px; top: 80px; left: -60px; transform: rotate(-8deg); }
.bg-ui .c2 { width: 250px; height: 140px; top: 200px; right: -40px; transform: rotate(5deg); }
.bg-ui .c3 { width: 280px; height: 160px; bottom: 200px; left: -30px; transform: rotate(3deg); }
.bg-ui .c4 { width: 320px; height: 120px; bottom: 100px; right: -50px; transform: rotate(-6deg); }

.logo {
  display: none;
}
.logo-icon {
  width: 72px; height: 72px; background: linear-gradient(135deg, #00A3FF, #00E08E);
  border-radius: 18px; display: flex; align-items: center; justify-content: center;
}
.logo-icon svg { width: 40px; height: 40px; }
.logo-text {
  font-family: 'Space Grotesk', sans-serif; font-weight: 700;
  font-size: 44px;
}
.logo-text .sync { color: #00A3FF; }

.headline {
  font-family: 'Space Grotesk', sans-serif; font-weight: 700;
  font-size: 92px; line-height: 1.08; text-align: center;
  max-width: 900px; margin-bottom: 20px;
}
.headline .brand { color: #00A3FF; }

.body-sub {
  font-size: 38px; color: rgba(255,255,255,0.55); text-align: center;
  margin-bottom: 60px;
}

.cta-button {
  background: #00A3FF; color: #fff; border: none;
  padding: 28px 80px; border-radius: 20px;
  font-family: 'Space Grotesk', sans-serif; font-weight: 700;
  font-size: 40px; cursor: pointer;
  box-shadow: 0 8px 40px rgba(0,163,255,0.3);
  margin-bottom: 30px;
}

.arrow-down {
  margin-bottom: 50px; opacity: 0.4;
}

.slogan {
  font-family: 'DM Sans', sans-serif; font-weight: 500;
  font-size: 34px; color: #F5B800; text-align: center;
  position: absolute; bottom: 80px;
}
.brand-logo {
  position: absolute;
  top: 24px;
  left: 50%;
  transform: translateX(-50%);
  width: 220px;
  height: auto;
  filter: brightness(2.5) contrast(1.2);
  z-index: 100;
  pointer-events: none;
}
</style>
</head>
<body>
  <img src="../../../../assets/logo-saudesync.svg" class="brand-logo" alt="Saúde Sync">

  <div class="bg-ui">
    <div class="ui-card c1"></div>
    <div class="ui-card c2"></div>
    <div class="ui-card c3"></div>
    <div class="ui-card c4"></div>
  </div>

  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 40 40" fill="none">
        <path d="M20 6 L20 34 M12 14 L20 6 L28 14" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="20" cy="28" r="4" fill="#fff"/>
      </svg>
    </div>
    <span class="logo-text">Saúde <span class="sync">Sync</span></span>
  </div>

  <h1 class="headline">Descubra sua taxa de adesão real.</h1>

  <p class="body-sub">Baixe o Saúde Sync — Link na bio</p>

  <div class="cta-button">Baixe agora</div>

  <svg class="arrow-down" width="40" height="40" viewBox="0 0 40 40" fill="none">
    <path d="M20 8 L20 32 M10 24 L20 32 L30 24" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>

  <div class="slogan">A consulta acaba. O cuidado continua.</div>
</body>
</html>
