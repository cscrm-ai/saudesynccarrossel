<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1350">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=DM+Sans:wght@500&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1350px; overflow: hidden;
  background: #0A0E17; color: #fff;
  font-family: 'DM Sans', sans-serif; font-weight: 500;
  display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
  padding: 300px 80px 80px;
  position: relative;
}
.headline {
  font-family: 'Space Grotesk', sans-serif; font-weight: 700;
  font-size: 84px; line-height: 1.1; text-align: center;
  max-width: 900px; margin-bottom: 40px;
}
.checklist {
  background: #0D1420; border-radius: 24px; padding: 30px 60px;
  width: 100%; max-width: 820px;
}
.check-item {
  display: flex; align-items: center; gap: 28px;
  padding: 18px 0; border-bottom: 1px solid rgba(255,255,255,0.06);
  font-size: 40px;
}
.check-item:last-child { border-bottom: none; }
.check-item .time {
  font-family: 'JetBrains Mono', monospace; font-weight: 600;
  color: rgba(255,255,255,0.5); min-width: 220px;
}
.check-item .med { color: rgba(255,255,255,0.7); flex: 1; }
.x-mark {
  width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
  background: rgba(255,68,85,0.15); border-radius: 12px;
}
.x-mark svg { width: 24px; height: 24px; }
.body-text {
  font-size: 38px; color: rgba(255,255,255,0.55); text-align: center;
  max-width: 750px; line-height: 1.55; margin-top: 35px;
}
.brand-logo {
  position: absolute;
  top: 24px;
  left: 50%;
  transform: translateX(-50%);
  width: 220px;
  height: auto;
  filter: brightness(2.5) contrast(1.2);
  z-index: 100;
  pointer-events: none;
}
</style>
</head>
<body>
  <img src="../../../../assets/logo-saudesync.svg" class="brand-logo" alt="Saúde Sync">

  <h1 class="headline">Você esqueceu o remédio das 8h.</h1>

  <div class="checklist">
    <div class="check-item">
      <span class="time">Hoje · 08:00</span>
      <span class="med">Losartana 50mg</span>
      <div class="x-mark"><svg viewBox="0 0 24 24" fill="none" stroke="#FF4455" stroke-width="3" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></div>
    </div>
    <div class="check-item">
      <span class="time">Hoje · 14:00</span>
      <span class="med">Metformina 500mg</span>
      <div class="x-mark"><svg viewBox="0 0 24 24" fill="none" stroke="#FF4455" stroke-width="3" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></div>
    </div>
    <div class="check-item">
      <span class="time">Ontem · 20:00</span>
      <span class="med">Sinvastatina 20mg</span>
      <div class="x-mark"><svg viewBox="0 0 24 24" fill="none" stroke="#FF4455" stroke-width="3" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></div>
    </div>
    <div class="check-item">
      <span class="time">Terça · 08:00</span>
      <span class="med">Losartana 50mg</span>
      <div class="x-mark"><svg viewBox="0 0 24 24" fill="none" stroke="#FF4455" stroke-width="3" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></div>
    </div>
  </div>

  <p class="body-text">E das 14h. E de ontem.<br>E de terça passada também.</p>
</body>
</html>
