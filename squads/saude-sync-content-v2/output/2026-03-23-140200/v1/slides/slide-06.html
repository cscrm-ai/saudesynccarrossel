<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1350">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=DM+Sans:wght@500&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1350px; overflow: hidden;
  background: #0A0E17; color: #fff;
  font-family: 'DM Sans', sans-serif; font-weight: 500;
  display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
  padding: 300px 80px 80px;
  position: relative;
}
.headline {
  font-family: 'Space Grotesk', sans-serif; font-weight: 700;
  font-size: 86px; line-height: 1.1; text-align: center;
  max-width: 900px; margin-bottom: 55px;
}
.notification {
  background: #0D1420; border-radius: 28px; padding: 0;
  width: 100%; max-width: 820px;
  border: 2px solid rgba(0,163,255,0.3);
  box-shadow: 0 0 60px rgba(0,163,255,0.1);
  overflow: hidden;
}
.notif-header {
  display: flex; align-items: center; gap: 20px;
  padding: 36px 44px 0;
}
.bell-icon {
  width: 52px; height: 52px; background: rgba(0,163,255,0.15);
  border-radius: 16px; display: flex; align-items: center; justify-content: center;
  position: relative;
}
.bell-icon svg { width: 28px; height: 28px; }
.bell-badge {
  position: absolute; top: -4px; right: -4px; width: 18px; height: 18px;
  background: #00A3FF; border-radius: 50%; border: 3px solid #0D1420;
}
.notif-app {
  font-size: 26px; color: rgba(255,255,255,0.4); text-transform: uppercase;
  letter-spacing: 2px;
}
.notif-time {
  font-size: 24px; color: rgba(255,255,255,0.3); margin-left: auto;
  font-family: 'JetBrains Mono', monospace;
}
.notif-body {
  padding: 30px 44px 36px;
}
.notif-title {
  font-family: 'Space Grotesk', sans-serif; font-weight: 700;
  font-size: 42px; margin-bottom: 10px;
}
.notif-sub {
  font-size: 32px; color: rgba(255,255,255,0.5); margin-bottom: 0;
}
.notif-actions {
  display: flex; border-top: 1px solid rgba(255,255,255,0.06);
}
.notif-btn {
  flex: 1; text-align: center; padding: 30px; font-size: 34px;
  font-family: 'DM Sans', sans-serif; font-weight: 500;
  cursor: pointer;
}
.notif-btn.primary {
  background: rgba(0,224,142,0.12); color: #00E08E;
  border-right: 1px solid rgba(255,255,255,0.06);
}
.notif-btn.secondary {
  color: rgba(255,255,255,0.4);
}
.body-text {
  font-size: 38px; color: rgba(255,255,255,0.55); text-align: center;
  max-width: 780px; line-height: 1.55; margin-top: 55px;
}
.brand-logo {
  position: absolute;
  top: 24px;
  left: 50%;
  transform: translateX(-50%);
  width: 220px;
  height: auto;
  filter: brightness(2.5) contrast(1.2);
  z-index: 100;
  pointer-events: none;
}
</style>
</head>
<body>
  <img src="../../../../assets/logo-saudesync.svg" class="brand-logo" alt="Saúde Sync">

  <h1 class="headline">O Saúde Sync lembra por você.</h1>

  <div class="notification">
    <div class="notif-header">
      <div class="bell-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#00A3FF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <div class="bell-badge"></div>
      </div>
      <span class="notif-app">Saúde Sync</span>
      <span class="notif-time">08:00</span>
    </div>
    <div class="notif-body">
      <div class="notif-title">Hora do Losartana 50mg 💊</div>
      <div class="notif-sub">Sua dose das 08:00 está esperando</div>
    </div>
    <div class="notif-actions">
      <div class="notif-btn primary">✓ Tomei</div>
      <div class="notif-btn secondary">Lembrar depois</div>
    </div>
  </div>

  <p class="body-text">Lembretes inteligentes antes de cada dose. E se você esquecer, ele registra isso também.</p>
</body>
</html>
