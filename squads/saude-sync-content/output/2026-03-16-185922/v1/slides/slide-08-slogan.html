<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 08 — Reforço emocional / Slogan</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&family=Nunito+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1440px;
    background-color: #1A3A8F;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .container {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 80px 96px; position: relative;
  }
  .content { text-align: center; max-width: 860px; }
  /* Slogan respira sozinho */
  .headline {
    font-family: 'Poppins', sans-serif; font-weight: 700;
    font-size: 96px; line-height: 1.1;
    color: #FFFFFF; letter-spacing: -1.5px;
    margin-bottom: 56px;
  }
  .headline .accent { color: #5BBB2F; }
  .divider {
    width: 60px; height: 5px;
    background: #5BBB2F; border-radius: 3px;
    margin: 0 auto 56px auto;
  }
  .body-text {
    font-family: 'Nunito Sans', sans-serif; font-weight: 500;
    font-size: 38px; line-height: 1.65;
    color: #2BBFBF;
  }
  .logo {
    position: absolute; bottom: 52px; right: 72px;
    display: flex; align-items: center; gap: 12px;
  }
  .logo-dot { width: 18px; height: 18px; background-color: #5BBB2F; border-radius: 50%; }
  .logo-text {
    font-family: 'Poppins', sans-serif; font-weight: 700;
    font-size: 26px; color: rgba(255,255,255,0.50);
  }
</style>
</head>
<body>
  <div class="container">
    <div class="content">
      <!-- Slogan com muito espaço negativo — respira -->
      <h1 class="headline">A consulta acaba.<br><span class="accent">O cuidado continua.</span></h1>
      <div class="divider"></div>
      <p class="body-text">Você merece acompanhar sua saúde todos os dias — não só quando está no consultório.</p>
    </div>
    <div class="logo">
      <div class="logo-dot"></div>
      <span class="logo-text">Saúde Sync</span>
    </div>
  </div>
</body>
</html>
