<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 07 — Benefício concreto</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&family=Nunito+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1440px;
    background-color: #5BBB2F;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .container {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 80px 96px; position: relative;
  }
  .content { text-align: center; max-width: 900px; }
  .slide-num {
    font-family: 'Nunito Sans', sans-serif; font-size: 28px;
    color: rgba(255,255,255,0.40); letter-spacing: 3px;
    margin-bottom: 64px;
  }
  .headline {
    font-family: 'Poppins', sans-serif; font-weight: 700;
    font-size: 82px; line-height: 1.12;
    color: #FFFFFF; letter-spacing: -0.5px;
    margin-bottom: 52px;
  }
  .divider {
    width: 72px; height: 5px;
    background: rgba(255,255,255,0.40); border-radius: 3px;
    margin: 0 auto 52px auto;
  }
  .body-text {
    font-family: 'Nunito Sans', sans-serif; font-weight: 500;
    font-size: 38px; line-height: 1.65;
    color: rgba(255,255,255,0.90);
    margin-bottom: 64px;
  }
  /* Cena de parceria — representação minimalista em CSS */
  .scene {
    display: flex; align-items: center; justify-content: center;
    gap: 48px;
  }
  .person {
    display: flex; flex-direction: column; align-items: center; gap: 16px;
  }
  .person-icon {
    width: 90px; height: 90px;
    background: rgba(255,255,255,0.20);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 46px;
  }
  .person-label {
    font-family: 'Nunito Sans', sans-serif; font-weight: 500;
    font-size: 26px; color: rgba(255,255,255,0.65);
  }
  .connector {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .chart-box {
    background: rgba(255,255,255,0.18);
    border: 2px solid rgba(255,255,255,0.35);
    border-radius: 16px;
    padding: 16px 28px;
    font-family: 'Poppins', sans-serif; font-weight: 700;
    font-size: 22px; color: #FFFFFF;
  }
  .arrow {
    font-size: 28px; color: rgba(255,255,255,0.50);
  }
  .logo {
    position: absolute; bottom: 52px; right: 72px;
    display: flex; align-items: center; gap: 12px;
  }
  .logo-dot { width: 18px; height: 18px; background-color: #FFFFFF; border-radius: 50%; opacity: 0.65; }
  .logo-text {
    font-family: 'Poppins', sans-serif; font-weight: 700;
    font-size: 26px; color: rgba(255,255,255,0.55);
  }
</style>
</head>
<body>
  <div class="container">
    <div class="content">
      <div class="slide-num">07</div>
      <h1 class="headline">Chegar na consulta com o histórico completo muda tudo.</h1>
      <div class="divider"></div>
      <p class="body-text">Seu médico vê o que aconteceu nos últimos 30 dias —<br>não só o momento da consulta.</p>
      <div class="scene">
        <div class="person">
          <div class="person-icon">🧑</div>
          <span class="person-label">você</span>
        </div>
        <div class="connector">
          <div class="chart-box">📊 histórico</div>
          <span class="arrow">→</span>
        </div>
        <div class="person">
          <div class="person-icon">👩‍⚕️</div>
          <span class="person-label">seu médico</span>
        </div>
      </div>
    </div>
    <div class="logo">
      <div class="logo-dot"></div>
      <span class="logo-text">Saúde Sync</span>
    </div>
  </div>
</body>
</html>
