<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 04 — Virada / Solução</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&family=Nunito+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1440px;
    background-color: #5BBB2F;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .container {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 80px 96px; position: relative;
  }
  .content { text-align: center; max-width: 900px; }
  .label {
    font-family: 'Nunito Sans', sans-serif; font-weight: 500;
    font-size: 28px; color: rgba(255,255,255,0.60);
    letter-spacing: 3px; text-transform: uppercase;
    margin-bottom: 48px;
  }
  .headline {
    font-family: 'Poppins', sans-serif; font-weight: 700;
    font-size: 84px; line-height: 1.1;
    color: #FFFFFF; letter-spacing: -1px;
    margin-bottom: 52px;
  }
  .divider {
    width: 80px; height: 5px;
    background: rgba(255,255,255,0.45); border-radius: 3px;
    margin: 0 auto 52px auto;
  }
  /* Compliance fix: "registrados por você" em vez de "monitorados" */
  .body-text {
    font-family: 'Nunito Sans', sans-serif; font-weight: 500;
    font-size: 38px; line-height: 1.65;
    color: rgba(255,255,255,0.92);
    margin-bottom: 60px;
  }
  .pills { display: flex; gap: 24px; justify-content: center; flex-wrap: wrap; }
  .pill {
    background: rgba(255,255,255,0.20);
    border: 2px solid rgba(255,255,255,0.40);
    border-radius: 60px; padding: 16px 36px;
    font-family: 'Poppins', sans-serif; font-weight: 700;
    font-size: 30px; color: #FFFFFF;
  }
  .logo {
    position: absolute; bottom: 52px; right: 72px;
    display: flex; align-items: center; gap: 12px;
  }
  .logo-dot { width: 18px; height: 18px; background-color: #FFFFFF; border-radius: 50%; opacity: 0.65; }
  .logo-text {
    font-family: 'Poppins', sans-serif; font-weight: 700;
    font-size: 26px; color: rgba(255,255,255,0.55);
  }
</style>
</head>
<body>
  <div class="container">
    <div class="content">
      <div class="label">A resposta chegou</div>
      <h1 class="headline">O Saúde Sync registra o que acontece entre as consultas.</h1>
      <div class="divider"></div>
      <!-- Compliance: "registrados por você" — não "monitorados" (evita enquadramento ANVISA) -->
      <p class="body-text">Pressão, glicemia e sinais vitais<br><strong>registrados por você</strong> e organizados no app.</p>
      <div class="pills">
        <span class="pill">Gratuito</span>
        <span class="pill">Pelo celular</span>
      </div>
    </div>
    <div class="logo">
      <div class="logo-dot"></div>
      <span class="logo-text">Saúde Sync</span>
    </div>
  </div>
</body>
</html>
