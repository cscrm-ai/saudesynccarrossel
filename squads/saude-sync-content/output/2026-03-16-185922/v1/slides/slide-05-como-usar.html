<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 05 — Como usar</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Nunito+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1440px;
    background-color: #2BBFBF;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .container {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    justify-content: flex-start;
    padding: 100px 96px 80px; position: relative;
  }
  .label {
    font-family: 'Nunito Sans', sans-serif; font-weight: 500;
    font-size: 28px; color: rgba(255,255,255,0.50);
    letter-spacing: 3px; text-transform: uppercase;
    margin-bottom: 48px;
  }
  .headline {
    font-family: 'Poppins', sans-serif; font-weight: 600;
    font-size: 72px; line-height: 1.15;
    color: #FFFFFF; letter-spacing: -0.5px;
    margin-bottom: 72px;
  }
  .steps { display: flex; flex-direction: column; gap: 0; }
  .step {
    display: flex; align-items: flex-start;
    gap: 0; padding: 40px 0;
    border-bottom: 1px solid rgba(255,255,255,0.18);
  }
  .step:last-child { border-bottom: none; }
  /* Número em círculo branco */
  .step-num {
    width: 72px; height: 72px; flex-shrink: 0;
    background: #1A3A8F;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Poppins', sans-serif; font-weight: 700;
    font-size: 34px; color: #FFFFFF;
    margin-right: 40px; margin-top: 4px;
  }
  .step-text {
    font-family: 'Nunito Sans', sans-serif; font-weight: 500;
    font-size: 38px; line-height: 1.5;
    color: rgba(255,255,255,0.92);
  }
  .logo {
    position: absolute; bottom: 52px; right: 72px;
    display: flex; align-items: center; gap: 12px;
  }
  .logo-dot { width: 18px; height: 18px; background-color: #1A3A8F; border-radius: 50%; opacity: 0.7; }
  .logo-text {
    font-family: 'Poppins', sans-serif; font-weight: 700;
    font-size: 26px; color: rgba(255,255,255,0.50);
  }
</style>
</head>
<body>
  <div class="container">
    <div class="label">Simples assim</div>
    <h1 class="headline">Em 3 passos, você acompanha tudo pelo celular.</h1>
    <div class="steps">
      <div class="step">
        <div class="step-num">1</div>
        <span class="step-text">Registre sua medição<br><strong>no app Saúde Sync</strong></span>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <span class="step-text">Veja seu <strong>histórico completo</strong><br>dia a dia</span>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <span class="step-text"><strong>Compartilhe com seu médico</strong><br>na próxima consulta</span>
      </div>
    </div>
    <div class="logo">
      <div class="logo-dot"></div>
      <span class="logo-text">Saúde Sync</span>
    </div>
  </div>
</body>
</html>
