<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 09 — CTA + Disclaimer</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&family=Nunito+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1440px;
    background-color: #2BBFBF;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .container {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: space-between;
    padding: 100px 96px 60px;
  }
  .top {
    display: flex; flex-direction: column;
    align-items: center; text-align: center;
    flex: 1; justify-content: center;
    max-width: 900px;
  }
  .accent-bar {
    width: 72px; height: 6px;
    background: #1A3A8F; border-radius: 3px;
    margin-bottom: 60px;
  }
  .headline {
    font-family: 'Poppins', sans-serif; font-weight: 700;
    font-size: 88px; line-height: 1.1;
    color: #FFFFFF; letter-spacing: -1px;
    margin-bottom: 48px;
  }
  .handle {
    font-family: 'Poppins', sans-serif; font-weight: 700;
    font-size: 44px; color: #1A3A8F;
    text-decoration: underline; text-underline-offset: 8px;
    margin-bottom: 72px;
  }
  .logo-central {
    display: flex; align-items: center; gap: 16px;
  }
  .logo-dot-lg { width: 26px; height: 26px; background-color: #1A3A8F; border-radius: 50%; }
  .logo-text-lg {
    font-family: 'Poppins', sans-serif; font-weight: 700;
    font-size: 38px; color: rgba(255,255,255,0.85);
  }
  /* Disclaimer legível — WCAG AA garantido */
  .disclaimer {
    width: 100%;
    border-top: 1px solid rgba(255,255,255,0.25);
    padding-top: 32px; text-align: center;
  }
  .disclaimer p {
    font-family: 'Nunito Sans', sans-serif; font-weight: 400;
    font-size: 26px; line-height: 1.6;
    color: rgba(255,255,255,0.75);
  }
</style>
</head>
<body>
  <div class="container">
    <div class="top">
      <div class="accent-bar"></div>
      <h1 class="headline">Baixe o Saúde Sync e comece a monitorar hoje.</h1>
      <div class="handle">@app.saudesync</div>
      <div class="logo-central">
        <div class="logo-dot-lg"></div>
        <span class="logo-text-lg">Saúde Sync</span>
      </div>
    </div>
    <!-- Disclaimer obrigatório — 26px, legível -->
    <div class="disclaimer">
      <p>Este conteúdo tem caráter informativo e não substitui avaliação<br>
      de profissional de saúde habilitado.<br>
      Dúvidas sobre sua saúde? Fale com seu médico.</p>
    </div>
  </div>
</body>
</html>
