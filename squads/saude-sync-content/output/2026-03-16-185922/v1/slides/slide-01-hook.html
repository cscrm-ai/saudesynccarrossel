<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 01 — Hook</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&family=Nunito+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1440px;
    background-color: #1A3A8F;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    overflow: hidden;
  }
  .container {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 80px 96px;
    position: relative;
  }
  .content { text-align: center; max-width: 900px; }
  .headline {
    font-family: 'Poppins', sans-serif; font-weight: 700;
    font-size: 88px; line-height: 1.1;
    color: #FFFFFF; letter-spacing: -1px;
    margin-bottom: 52px;
  }
  .subtitle {
    font-family: 'Nunito Sans', sans-serif; font-weight: 500;
    font-size: 38px; line-height: 1.55;
    color: #2BBFBF;
  }
  /* Seta deslize */
  .swipe-hint {
    position: absolute; bottom: 60px; right: 80px;
    display: flex; align-items: center; gap: 12px;
    opacity: 0.30;
  }
  .swipe-text {
    font-family: 'Nunito Sans', sans-serif; font-weight: 500;
    font-size: 24px; color: #FFFFFF; letter-spacing: 2px;
    text-transform: uppercase;
  }
  .swipe-arrow {
    width: 40px; height: 40px;
    border-right: 4px solid #FFFFFF;
    border-top: 4px solid #FFFFFF;
    transform: rotate(45deg);
  }
  /* Logo */
  .logo {
    position: absolute; bottom: 52px; left: 80px;
    display: flex; align-items: center; gap: 12px;
  }
  .logo-dot { width: 18px; height: 18px; background-color: #5BBB2F; border-radius: 50%; }
  .logo-text {
    font-family: 'Poppins', sans-serif; font-weight: 700;
    font-size: 26px; color: rgba(255,255,255,0.50); letter-spacing: 0.5px;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="content">
      <h1 class="headline">Você não precisa esperar a consulta para saber como está.</h1>
      <p class="subtitle">Arraste e veja o que muda quando o cuidado não para.</p>
    </div>
    <div class="swipe-hint">
      <span class="swipe-text">arraste</span>
      <div class="swipe-arrow"></div>
    </div>
    <div class="logo">
      <div class="logo-dot"></div>
      <span class="logo-text">Saúde Sync</span>
    </div>
  </div>
</body>
</html>
