<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 06 — Dado de impacto</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&family=Nunito+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1440px;
    background-color: #F97316;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .container {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 80px 72px; position: relative;
  }
  .content { text-align: center; width: 100%; }
  /* "7 em cada 10" gigante */
  .big-stat {
    font-family: 'Poppins', sans-serif; font-weight: 700;
    font-size: 200px; line-height: 0.9;
    color: #FFFFFF;
    letter-spacing: -6px;
    display: block;
    margin-bottom: 8px;
  }
  .stat-label {
    font-family: 'Poppins', sans-serif; font-weight: 700;
    font-size: 44px; line-height: 1.15;
    color: #FFFFFF; letter-spacing: -0.5px;
    margin-bottom: 8px;
  }
  .stat-sub {
    font-family: 'Poppins', sans-serif; font-weight: 700;
    font-size: 52px; line-height: 1.15;
    color: #FFFFFF;
    margin-bottom: 48px;
  }
  .divider {
    width: 80px; height: 4px;
    background: rgba(255,255,255,0.40); border-radius: 2px;
    margin: 0 auto 48px auto;
  }
  .body-text {
    font-family: 'Nunito Sans', sans-serif; font-weight: 500;
    font-size: 34px; line-height: 1.65;
    color: rgba(255,255,255,0.88);
    margin-bottom: 20px;
  }
  /* Nota de fonte — compliance */
  .fonte {
    font-family: 'Nunito Sans', sans-serif; font-weight: 400;
    font-size: 22px; color: rgba(255,255,255,0.55);
    font-style: italic;
  }
  .logo {
    position: absolute; bottom: 52px; right: 72px;
    display: flex; align-items: center; gap: 12px;
  }
  .logo-dot { width: 18px; height: 18px; background-color: #FFFFFF; border-radius: 50%; opacity: 0.60; }
  .logo-text {
    font-family: 'Poppins', sans-serif; font-weight: 700;
    font-size: 26px; color: rgba(255,255,255,0.50);
  }
</style>
</head>
<body>
  <div class="container">
    <div class="content">
      <!-- Dado gigante — pausa forçada no scroll -->
      <span class="big-stat">7/10</span>
      <div class="stat-label">pacientes com hipertensão</div>
      <div class="stat-sub">não percebem variações<br>entre consultas.</div>
      <div class="divider"></div>
      <p class="body-text">Variações que, registradas, ajudam o médico<br>a personalizar melhor o seu acompanhamento.</p>
      <!-- Compliance: nota de fonte do dado -->
      <p class="fonte">Estimativa baseada em estudos de adesão a tratamento de doenças crônicas.</p>
    </div>
    <div class="logo">
      <div class="logo-dot"></div>
      <span class="logo-text">Saúde Sync</span>
    </div>
  </div>
</body>
</html>
