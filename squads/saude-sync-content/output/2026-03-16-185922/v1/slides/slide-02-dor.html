<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 02 — Dor / Identificação</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&family=Nunito+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1440px;
    background-color: #1A3A8F;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    overflow: hidden;
  }
  .container {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 80px 96px; position: relative;
  }
  .content { text-align: center; max-width: 880px; }
  .slide-num {
    font-family: 'Nunito Sans', sans-serif; font-size: 28px;
    color: rgba(255,255,255,0.30); letter-spacing: 3px;
    margin-bottom: 72px;
  }
  /* Pensamento em destaque — como se fosse flutuando */
  .thought-bubble {
    background: rgba(255,255,255,0.07);
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 24px;
    padding: 52px 56px;
    margin-bottom: 56px;
  }
  .thought-open {
    font-family: 'Poppins', sans-serif; font-weight: 700;
    font-size: 28px; color: rgba(255,255,255,0.35);
    display: block; margin-bottom: 16px;
    text-align: left;
  }
  .headline {
    font-family: 'Poppins', sans-serif; font-weight: 700;
    font-size: 76px; line-height: 1.15;
    color: #FFFFFF; letter-spacing: -0.5px;
    text-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  .thought-close {
    font-family: 'Poppins', sans-serif; font-weight: 700;
    font-size: 28px; color: rgba(255,255,255,0.35);
    display: block; margin-top: 16px;
    text-align: right;
  }
  .body-text {
    font-family: 'Nunito Sans', sans-serif; font-weight: 500;
    font-size: 36px; line-height: 1.65;
    color: rgba(255,255,255,0.75);
  }
  .logo {
    position: absolute; bottom: 52px; right: 72px;
    display: flex; align-items: center; gap: 12px;
  }
  .logo-dot { width: 18px; height: 18px; background-color: #5BBB2F; border-radius: 50%; }
  .logo-text {
    font-family: 'Poppins', sans-serif; font-weight: 700;
    font-size: 26px; color: rgba(255,255,255,0.45);
  }
</style>
</head>
<body>
  <div class="container">
    <div class="content">
      <div class="slide-num">02</div>
      <div class="thought-bubble">
        <span class="thought-open">"</span>
        <h1 class="headline">Será que minha pressão está alta agora?</h1>
        <span class="thought-close">"</span>
      </div>
      <p class="body-text">Essa pergunta fica na cabeça entre uma consulta e outra — e não tem resposta fácil.</p>
    </div>
    <div class="logo">
      <div class="logo-dot"></div>
      <span class="logo-text">Saúde Sync</span>
    </div>
  </div>
</body>
</html>
