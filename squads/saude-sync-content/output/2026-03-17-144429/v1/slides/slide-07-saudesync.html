<!-- Contraste: #F0F2F5 sobre #0F0D00 ≈ 15:1 ✓ WCAG AA -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0A0E17; --bg2: #0D1420;
      --blue: #00A3FF; --blue-g: rgba(0,163,255,0.13);
      --red: #FF4455; --red-g: rgba(255,68,85,0.11);
      --green: #00E08E; --green-g: rgba(0,224,142,0.11);
      --gold: #F5B800; --gold-g: rgba(245,184,0,0.11);
      --white: #F0F2F5; --gray: #6B7A8D; --gray-l: #9BA8B8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1440px;
      background: linear-gradient(155deg, #0F0D00 0%, #1A1500 100%);
      border: 1px solid rgba(245,184,0,0.12);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      position: relative; overflow: hidden;
      padding: 290px 80px 60px;
      font-family: 'DM Sans', sans-serif;
      color: var(--white);
    }
    .glow {
      position: absolute;
      top: 45%; left: 50%; transform: translate(-50%, -50%);
      width: 800px; height: 800px;
      background: radial-gradient(circle, rgba(245,184,0,0.07) 0%, transparent 70%);
      border-radius: 50%; pointer-events: none;
    }
    .content {
      position: relative; z-index: 20;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 0 80px; text-align: center; gap: 52px;
    }
    .slogan {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700; font-size: 100px;
      line-height: 1.1; letter-spacing: -2px;
      color: var(--white);
    }
    .slogan em { color: var(--gold); font-style: normal; }
    .divider {
      width: 120px; height: 3px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .card {
      background: var(--gold-g);
      border: 1px solid rgba(245,184,0,0.18);
      border-radius: 24px;
      padding: 44px 56px;
      max-width: 920px;
    }
    .card-text {
      font-family: 'DM Sans', sans-serif;
      font-weight: 500; font-size: 42px;
      line-height: 1.5; color: var(--white);
    }
    .features {
      display: flex; gap: 24px; flex-wrap: wrap;
      justify-content: center;
    }
    .feat {
      background: rgba(245,184,0,0.08);
      border: 1px solid rgba(245,184,0,0.15);
      border-radius: 50px;
      padding: 14px 32px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700; font-size: 32px;
      color: var(--gold);
    }
    .handle {
      font-family: 'DM Sans', sans-serif;
      font-weight: 700; font-size: 36px;
      color: var(--gray-l);
    }
  </style>
</head>
<body>
  <!-- LOGO WATERMARK — NÃO REMOVER -->
  <div style="position:absolute;top:60px;left:50%;transform:translateX(-50%);z-index:10;pointer-events:none;">
    <img src="saudesync-logo.png" style="width:420px;mix-blend-mode:screen;opacity:0.12;display:block;">
  </div>

  <div class="glow"></div>

  <div class="content">
    <h2 class="slogan">A consulta acaba.<br><em>O cuidado continua.</em></h2>
    <div class="divider"></div>
    <div class="card">
      <p class="card-text">A Saúde Sync foi criada para ser o elo entre você e o seu tratamento — mesmo nos dias em que o médico não está por perto.</p>
    </div>
    <div class="features">
      <span class="feat">Lembretes</span>
      <span class="feat">Histórico</span>
      <span class="feat">Acompanhamento</span>
    </div>
    <p class="handle">@app.saudesync</p>
  </div>
</body>
</html>
