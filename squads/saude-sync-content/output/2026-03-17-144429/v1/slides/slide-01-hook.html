<!-- Contraste: #F0F2F5 sobre #09101E ≈ 15:1 ✓ WCAG AA -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0A0E17; --bg2: #0D1420;
      --blue: #00A3FF; --blue-g: rgba(0,163,255,0.13);
      --red: #FF4455; --red-g: rgba(255,68,85,0.11);
      --green: #00E08E; --green-g: rgba(0,224,142,0.11);
      --gold: #F5B800; --gold-g: rgba(245,184,0,0.11);
      --white: #F0F2F5; --gray: #6B7A8D; --gray-l: #9BA8B8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1440px;
      background: linear-gradient(155deg, #09101E 0%, #0E1829 100%);
      border: 1px solid rgba(255,255,255,0.06);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      position: relative; overflow: hidden;
      padding: 290px 80px 60px;
      font-family: 'DM Sans', sans-serif;
      color: var(--white);
    }
    .glow {
      position: absolute;
      top: 45%; left: 50%; transform: translate(-50%, -50%);
      width: 800px; height: 800px;
      background: radial-gradient(circle, rgba(0,163,255,0.07) 0%, transparent 70%);
      border-radius: 50%; pointer-events: none;
    }
    .content {
      position: relative; z-index: 20;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 0 80px; text-align: center; gap: 40px;
    }
    .tag {
      font-family: 'DM Sans', sans-serif;
      font-weight: 700; font-size: 28px;
      letter-spacing: 3px; text-transform: uppercase;
      color: var(--blue); opacity: 0.85;
    }
    .headline {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700; font-size: 96px;
      line-height: 1.05; letter-spacing: -2px;
      color: var(--white);
    }
    .headline em {
      color: var(--blue); font-style: normal;
    }
    .divider {
      width: 80px; height: 3px;
      background: linear-gradient(90deg, transparent, var(--blue), transparent);
    }
    .subtext {
      font-family: 'DM Sans', sans-serif;
      font-weight: 500; font-size: 44px;
      line-height: 1.4; color: var(--gray-l);
      max-width: 820px;
    }
    .badge {
      background: var(--blue-g);
      border: 1px solid rgba(0,163,255,0.25);
      border-radius: 50px; padding: 14px 36px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700; font-size: 30px;
      color: var(--blue); letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <!-- LOGO WATERMARK — NÃO REMOVER -->
  <div style="position:absolute;top:60px;left:50%;transform:translateX(-50%);z-index:10;pointer-events:none;">
    <img src="saudesync-logo.png" style="width:420px;mix-blend-mode:screen;opacity:0.12;display:block;">
  </div>

  <div class="glow"></div>

  <div class="content">
    <span class="tag">Saúde em números</span>
    <h1 class="headline"><em>Metade</em> das pessoas não toma o remédio certo.</h1>
    <div class="divider"></div>
    <p class="subtext">E isso afeta muito mais do que você imagina.</p>
    <div class="badge">Deslize para entender →</div>
  </div>
</body>
</html>
