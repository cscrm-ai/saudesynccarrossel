<!-- Contraste: #F0F2F5 sobre #0A0E17 ≈ 15:1 ✓ WCAG AA | #0A0E17 sobre #00A3FF → não usado em texto pequeno -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0A0E17; --bg2: #0D1420;
      --blue: #00A3FF; --blue-g: rgba(0,163,255,0.13);
      --red: #FF4455; --red-g: rgba(255,68,85,0.11);
      --green: #00E08E; --green-g: rgba(0,224,142,0.11);
      --gold: #F5B800; --gold-g: rgba(245,184,0,0.11);
      --white: #F0F2F5; --gray: #6B7A8D; --gray-l: #9BA8B8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1440px;
      background: linear-gradient(155deg, #0A1628 0%, #0D2243 100%);
      border: 1px solid rgba(0,163,255,0.12);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      position: relative; overflow: hidden;
      padding: 290px 80px 60px;
      font-family: 'DM Sans', sans-serif;
      color: var(--white);
    }
    .glow {
      position: absolute;
      top: 40%; left: 50%; transform: translate(-50%, -50%);
      width: 750px; height: 750px;
      background: radial-gradient(circle, rgba(0,163,255,0.1) 0%, transparent 70%);
      border-radius: 50%; pointer-events: none;
    }
    .content {
      position: relative; z-index: 20;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 0 80px; text-align: center; gap: 48px;
    }
    .label {
      font-family: 'DM Sans', sans-serif;
      font-weight: 700; font-size: 28px;
      letter-spacing: 3px; text-transform: uppercase;
      color: var(--blue); opacity: 0.8;
    }
    .big-number {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600; font-size: 200px;
      line-height: 1; letter-spacing: -4px;
      color: var(--blue);
      text-shadow: 0 0 80px rgba(0,163,255,0.4);
    }
    .card {
      background: var(--blue-g);
      border: 1px solid rgba(0,163,255,0.18);
      border-radius: 24px;
      padding: 44px 56px;
      max-width: 900px;
    }
    .card-text {
      font-family: 'DM Sans', sans-serif;
      font-weight: 500; font-size: 44px;
      line-height: 1.45; color: var(--white);
    }
    .card-text strong { color: var(--blue); }
    .source {
      font-family: 'DM Sans', sans-serif;
      font-weight: 400; font-size: 28px;
      color: var(--gray); font-style: italic;
    }
    .disclaimer {
      font-family: 'DM Sans', sans-serif;
      font-weight: 400; font-size: 26px;
      color: var(--gray);
      border-top: 1px solid rgba(255,255,255,0.07);
      padding-top: 24px; max-width: 900px;
      text-align: center;
    }
  </style>
</head>
<body>
  <!-- LOGO WATERMARK — NÃO REMOVER -->
  <div style="position:absolute;top:60px;left:50%;transform:translateX(-50%);z-index:10;pointer-events:none;">
    <img src="saudesync-logo.png" style="width:420px;mix-blend-mode:screen;opacity:0.12;display:block;">
  </div>

  <div class="glow"></div>

  <div class="content">
    <span class="label">O dado que surpreende</span>
    <div class="big-number">50%</div>
    <div class="card">
      <p class="card-text">dos pacientes com doenças crônicas <strong>não seguem o tratamento indicado.</strong><br>Uma em cada duas pessoas.</p>
    </div>
    <p class="source">Fonte: OMS (2003) — Adherence to Long-Term Therapies</p>
    <p class="disclaimer">⚠️ Conteúdo informativo. Não substitui a orientação do seu médico ou farmacêutico.</p>
  </div>
</body>
</html>
