<!-- Contraste: #F0F2F5 sobre #09101E ≈ 15:1 ✓ WCAG AA -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0A0E17; --bg2: #0D1420;
      --blue: #00A3FF; --blue-g: rgba(0,163,255,0.13);
      --red: #FF4455; --red-g: rgba(255,68,85,0.11);
      --green: #00E08E; --green-g: rgba(0,224,142,0.11);
      --gold: #F5B800; --gold-g: rgba(245,184,0,0.11);
      --white: #F0F2F5; --gray: #6B7A8D; --gray-l: #9BA8B8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1440px;
      background: linear-gradient(155deg, #09101E 0%, #0E1829 100%);
      border: 1px solid rgba(255,255,255,0.06);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      position: relative; overflow: hidden;
      padding: 290px 80px 60px;
      font-family: 'DM Sans', sans-serif;
      color: var(--white);
    }
    .glow {
      position: absolute;
      top: 45%; left: 50%; transform: translate(-50%, -50%);
      width: 800px; height: 800px;
      background: radial-gradient(circle, rgba(0,163,255,0.07) 0%, transparent 70%);
      border-radius: 50%; pointer-events: none;
    }
    .content {
      position: relative; z-index: 20;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 0 80px; text-align: center; gap: 48px;
    }
    .emoji-row {
      font-size: 72px; letter-spacing: 8px;
    }
    .headline {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700; font-size: 88px;
      line-height: 1.1; letter-spacing: -2px;
      color: var(--white);
    }
    .headline em { color: var(--blue); font-style: normal; }
    .sub {
      font-family: 'DM Sans', sans-serif;
      font-weight: 500; font-size: 42px;
      line-height: 1.5; color: var(--gray-l);
      max-width: 880px;
    }
    .cta-buttons {
      display: flex; gap: 24px; flex-wrap: wrap;
      justify-content: center;
    }
    .btn-primary {
      background: var(--blue);
      border-radius: 50px;
      padding: 20px 52px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700; font-size: 38px;
      color: #09101E; letter-spacing: 0.5px;
    }
    .btn-secondary {
      background: transparent;
      border: 2px solid rgba(0,163,255,0.4);
      border-radius: 50px;
      padding: 20px 52px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700; font-size: 38px;
      color: var(--blue);
    }
    .handle {
      font-family: 'DM Sans', sans-serif;
      font-weight: 700; font-size: 40px;
      color: var(--blue);
    }
    .disclaimer {
      font-family: 'DM Sans', sans-serif;
      font-weight: 400; font-size: 26px;
      color: var(--gray);
      border-top: 1px solid rgba(255,255,255,0.07);
      padding-top: 24px;
      max-width: 920px;
    }
  </style>
</head>
<body>
  <!-- LOGO WATERMARK — NÃO REMOVER -->
  <div style="position:absolute;top:60px;left:50%;transform:translateX(-50%);z-index:10;pointer-events:none;">
    <img src="saudesync-logo.png" style="width:420px;mix-blend-mode:screen;opacity:0.12;display:block;">
  </div>

  <div class="glow"></div>

  <div class="content">
    <div class="emoji-row">💊 💙</div>
    <h2 class="headline">Salva e <em>compartilha</em> com quem precisa ver isso.</h2>
    <p class="sub">Porque cuidar da saúde é mais fácil quando a gente não faz isso sozinho.</p>
    <div class="cta-buttons">
      <div class="btn-primary">Salvar post</div>
      <div class="btn-secondary">Compartilhar</div>
    </div>
    <p class="handle">@app.saudesync</p>
    <p class="disclaimer">⚠️ Conteúdo informativo. Não substitui a orientação do seu médico ou farmacêutico.</p>
  </div>
</body>
</html>
