<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 07 — Ângulo surpreendente</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&family=Nunito+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    /* Verde com gradiente escurecendo — profundidade, não leveza superficial */
    background: linear-gradient(to bottom, #5BBB2F 0%, #3d8a20 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
  }

  .container {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 96px;
    position: relative;
  }

  .content {
    text-align: center;
    max-width: 900px;
  }

  /* Ícone de desbloqueio visual */
  .icon-wrap {
    width: 100px;
    height: 100px;
    background-color: rgba(255, 255, 255, 0.15);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 56px auto;
    font-size: 52px;
  }

  .headline {
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 84px;
    line-height: 1.1;
    color: #FFFFFF;
    letter-spacing: -1px;
    margin-bottom: 56px;
  }

  .divider {
    width: 72px;
    height: 5px;
    background-color: rgba(255, 255, 255, 0.40);
    border-radius: 3px;
    margin: 0 auto 56px auto;
  }

  .body-text {
    font-family: 'Nunito Sans', sans-serif;
    font-weight: 500;
    font-size: 38px;
    line-height: 1.70;
    color: rgba(255, 255, 255, 0.90);
  }

  /* Nota de compliance aplicada: "conforme protocolo do programa" */
  .compliance-note {
    margin-top: 56px;
    background-color: rgba(255, 255, 255, 0.12);
    border-radius: 16px;
    padding: 28px 40px;
    font-family: 'Nunito Sans', sans-serif;
    font-weight: 500;
    font-size: 30px;
    color: rgba(255, 255, 255, 0.75);
    line-height: 1.5;
  }

  /* Logotipo no rodapé */
  .logo {
    position: absolute;
    bottom: 52px;
    right: 72px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-dot {
    width: 18px;
    height: 18px;
    background-color: #FFFFFF;
    border-radius: 50%;
    opacity: 0.65;
  }

  .logo-text {
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 26px;
    color: rgba(255, 255, 255, 0.50);
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="content">
      <!-- Verde #5BBB2F com gradiente — Surpresa positiva -->
      <!-- Slide com maior potencial de compartilhamento individual -->
      <div class="icon-wrap">🔓</div>

      <h1 class="headline">Você não precisa provar nada para ser atendida.</h1>

      <div class="divider"></div>

      <p class="body-text">
        O acesso não exige boletim de ocorrência<br>
        nem laudo médico.<br><br>
        O serviço é de acolhimento —<br>
        o primeiro passo é apenas dizer<br>
        que você precisa de apoio.
      </p>

      <!-- Nota de compliance: "conforme protocolo do programa" -->
      <div class="compliance-note">
        Conforme protocolo do programa,<br>o atendimento começa pelo seu relato.
      </div>
    </div>

    <!-- Logotipo -->
    <div class="logo">
      <div class="logo-dot"></div>
      <span class="logo-text">Saúde Sync</span>
    </div>
  </div>
</body>
</html>
