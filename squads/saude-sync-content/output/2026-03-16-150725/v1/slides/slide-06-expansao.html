<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 06 — Expansão nacional</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&family=Nunito+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background-color: #1A3A8F;
    display: flex;
    flex-direction: column;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
  }

  .container {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    padding: 100px 96px 80px 96px;
    position: relative;
  }

  .label {
    font-family: 'Nunito Sans', sans-serif;
    font-weight: 500;
    font-size: 28px;
    color: rgba(255, 255, 255, 0.40);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 48px;
  }

  .headline {
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 74px;
    line-height: 1.15;
    color: #FFFFFF;
    letter-spacing: -0.5px;
    margin-bottom: 72px;
    max-width: 880px;
  }

  /* Timeline de expansão */
  .timeline {
    display: flex;
    flex-direction: column;
    gap: 0;
    margin-bottom: 64px;
  }

  .timeline-item {
    display: flex;
    align-items: stretch;
    gap: 40px;
  }

  .timeline-left {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 56px;
    flex-shrink: 0;
  }

  .timeline-dot {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background-color: #5BBB2F;
    flex-shrink: 0;
    margin-top: 8px;
  }

  .timeline-line {
    width: 3px;
    flex: 1;
    background: linear-gradient(to bottom, #5BBB2F, rgba(91, 187, 47, 0.2));
    margin: 8px 0;
  }

  .timeline-item:last-child .timeline-line {
    display: none;
  }

  .timeline-content {
    padding-bottom: 52px;
    flex: 1;
  }

  .timeline-date {
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 32px;
    color: #5BBB2F;
    margin-bottom: 10px;
    letter-spacing: 0.3px;
  }

  .timeline-text {
    font-family: 'Nunito Sans', sans-serif;
    font-weight: 500;
    font-size: 36px;
    line-height: 1.5;
    color: rgba(255, 255, 255, 0.85);
  }

  /* Dado de impacto */
  .impact-box {
    background-color: rgba(91, 187, 47, 0.12);
    border: 2px solid rgba(91, 187, 47, 0.35);
    border-radius: 20px;
    padding: 40px 48px;
    text-align: center;
  }

  .impact-number {
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 72px;
    color: #5BBB2F;
    line-height: 1.0;
    margin-bottom: 12px;
  }

  .impact-label {
    font-family: 'Nunito Sans', sans-serif;
    font-weight: 500;
    font-size: 34px;
    color: rgba(255, 255, 255, 0.75);
    line-height: 1.4;
  }

  /* Logotipo no rodapé */
  .logo {
    position: absolute;
    bottom: 52px;
    right: 72px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-dot {
    width: 18px;
    height: 18px;
    background-color: #5BBB2F;
    border-radius: 50%;
  }

  .logo-text {
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 26px;
    color: rgba(255, 255, 255, 0.50);
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
  <div class="container">
    <!-- Azul #1A3A8F — Expansão / Escala -->
    <div class="label">Cobertura nacional</div>

    <h1 class="headline">Começa em dois estados. Chega no Brasil todo em junho.</h1>

    <div class="timeline">
      <div class="timeline-item">
        <div class="timeline-left">
          <div class="timeline-dot"></div>
          <div class="timeline-line"></div>
        </div>
        <div class="timeline-content">
          <div class="timeline-date">Março 2026</div>
          <div class="timeline-text">Recife e Rio de Janeiro —<br>primeiras cidades</div>
        </div>
      </div>

      <div class="timeline-item">
        <div class="timeline-left">
          <div class="timeline-dot"></div>
          <div class="timeline-line"></div>
        </div>
        <div class="timeline-content">
          <div class="timeline-date">Maio 2026</div>
          <div class="timeline-text">Municípios com mais de<br>150 mil habitantes</div>
        </div>
      </div>

      <div class="timeline-item">
        <div class="timeline-left">
          <div class="timeline-dot"></div>
        </div>
        <div class="timeline-content">
          <div class="timeline-date">Junho 2026</div>
          <div class="timeline-text">Atendimento nacional</div>
        </div>
      </div>
    </div>

    <!-- Dado de impacto -->
    <div class="impact-box">
      <div class="impact-number">4,7 milhões</div>
      <div class="impact-label">de consultas por ano — meta do programa</div>
    </div>

    <!-- Logotipo -->
    <div class="logo">
      <div class="logo-dot"></div>
      <span class="logo-text">Saúde Sync</span>
    </div>
  </div>
</body>
</html>
