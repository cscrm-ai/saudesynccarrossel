<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 01 — Hook</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&family=Nunito+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background-color: #1A3A8F;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
  }

  .container {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 90px;
    position: relative;
  }

  .content {
    text-align: center;
    max-width: 900px;
  }

  /* Acento verde horizontal acima do headline */
  .accent-bar {
    width: 72px;
    height: 6px;
    background-color: #5BBB2F;
    border-radius: 3px;
    margin: 0 auto 56px auto;
  }

  .headline {
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 86px;
    line-height: 1.1;
    color: #FFFFFF;
    letter-spacing: -1px;
    margin-bottom: 48px;
  }

  .subtitle {
    font-family: 'Nunito Sans', sans-serif;
    font-weight: 500;
    font-size: 38px;
    line-height: 1.5;
    color: rgba(255, 255, 255, 0.75);
    letter-spacing: 0.2px;
  }

  /* Logotipo no rodapé */
  .logo {
    position: absolute;
    bottom: 52px;
    right: 72px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-dot {
    width: 18px;
    height: 18px;
    background-color: #5BBB2F;
    border-radius: 50%;
  }

  .logo-text {
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 26px;
    color: rgba(255, 255, 255, 0.60);
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="content">
      <!-- Acento verde — silêncio visual reforça o peso da frase -->
      <div class="accent-bar"></div>

      <!-- Azul #1A3A8F — Impacto / Credibilidade -->
      <h1 class="headline">Agora o sistema não tem mais desculpa.</h1>

      <p class="subtitle">Apoio psicológico pelo SUS,<br>direto pelo celular, sem sair de casa.</p>
    </div>

    <!-- Logotipo Saúde Sync -->
    <div class="logo">
      <div class="logo-dot"></div>
      <span class="logo-text">Saúde Sync</span>
    </div>
  </div>
</body>
</html>
