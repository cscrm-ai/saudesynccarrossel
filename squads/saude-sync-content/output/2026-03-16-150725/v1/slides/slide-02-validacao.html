<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 02 — Validação da dor</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Nunito+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background-color: #2BBFBF;
    display: flex;
    flex-direction: column;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
  }

  .container {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    padding: 120px 96px 80px 96px;
    position: relative;
  }

  .slide-number {
    font-family: 'Nunito Sans', sans-serif;
    font-weight: 500;
    font-size: 28px;
    color: rgba(255, 255, 255, 0.45);
    margin-bottom: 80px;
    letter-spacing: 2px;
  }

  .headline {
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 76px;
    line-height: 1.15;
    color: #FFFFFF;
    letter-spacing: -0.5px;
    margin-bottom: 64px;
    max-width: 820px;
  }

  /* Linha separadora sutil */
  .divider {
    width: 56px;
    height: 4px;
    background-color: rgba(255, 255, 255, 0.40);
    border-radius: 2px;
    margin-bottom: 52px;
  }

  .body-text {
    font-family: 'Nunito Sans', sans-serif;
    font-weight: 500;
    font-size: 38px;
    line-height: 1.65;
    color: rgba(255, 255, 255, 0.90);
    max-width: 860px;
  }

  /* Logotipo no rodapé */
  .logo {
    position: absolute;
    bottom: 52px;
    right: 72px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-dot {
    width: 18px;
    height: 18px;
    background-color: #FFFFFF;
    border-radius: 50%;
    opacity: 0.6;
  }

  .logo-text {
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 26px;
    color: rgba(255, 255, 255, 0.50);
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
  <div class="container">
    <!-- Teal #2BBFBF — Empatia / Acolhimento -->
    <span class="slide-number">02</span>

    <h1 class="headline">Você já tentou.<br>O sistema te cansou.</h1>

    <div class="divider"></div>

    <p class="body-text">
      Fila de meses. Encaminhamento perdido.<br>
      UBS sem psicólogo.<br><br>
      Você não desistiu porque não queria —<br>
      desistiu porque o caminho não existia<br>
      de verdade.
    </p>

    <!-- Logotipo -->
    <div class="logo">
      <div class="logo-dot"></div>
      <span class="logo-text">Saúde Sync</span>
    </div>
  </div>
</body>
</html>
