<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 04 — Virada / Solução</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&family=Nunito+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background-color: #5BBB2F;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
  }

  .container {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 96px;
    position: relative;
  }

  .content {
    text-align: center;
    max-width: 920px;
  }

  .label {
    font-family: 'Nunito Sans', sans-serif;
    font-weight: 500;
    font-size: 28px;
    color: rgba(255, 255, 255, 0.60);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 48px;
  }

  .headline {
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 86px;
    line-height: 1.1;
    color: #FFFFFF;
    letter-spacing: -1px;
    margin-bottom: 64px;
  }

  /* Linha separadora branca */
  .divider {
    width: 80px;
    height: 5px;
    background-color: rgba(255, 255, 255, 0.50);
    border-radius: 3px;
    margin: 0 auto 56px auto;
  }

  .body-text {
    font-family: 'Nunito Sans', sans-serif;
    font-weight: 500;
    font-size: 38px;
    line-height: 1.70;
    color: rgba(255, 255, 255, 0.92);
  }

  /* Pills de benefícios */
  .pills {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 60px;
  }

  .pill {
    background-color: rgba(255, 255, 255, 0.20);
    border: 2px solid rgba(255, 255, 255, 0.40);
    border-radius: 60px;
    padding: 16px 36px;
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 30px;
    color: #FFFFFF;
    letter-spacing: 0.3px;
  }

  /* Logotipo no rodapé */
  .logo {
    position: absolute;
    bottom: 52px;
    right: 72px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-dot {
    width: 18px;
    height: 18px;
    background-color: #FFFFFF;
    border-radius: 50%;
    opacity: 0.70;
  }

  .logo-text {
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 26px;
    color: rgba(255, 255, 255, 0.55);
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="content">
      <!-- Verde #5BBB2F — Virada / Solução -->
      <div class="label">A mudança chegou</div>

      <h1 class="headline">O SUS colocou psicólogo no seu celular.</h1>

      <div class="divider"></div>

      <p class="body-text">
        Atendimento psicológico por videochamada<br>
        para mulheres em situação de violência.<br><br>
        Pelo app Meu SUS Digital<br>
        ou por qualquer UBS.
      </p>

      <!-- Pills de benefícios -->
      <div class="pills">
        <span class="pill">Sem custo</span>
        <span class="pill">Sem deslocamento</span>
      </div>
    </div>

    <!-- Logotipo -->
    <div class="logo">
      <div class="logo-dot"></div>
      <span class="logo-text">Saúde Sync</span>
    </div>
  </div>
</body>
</html>
