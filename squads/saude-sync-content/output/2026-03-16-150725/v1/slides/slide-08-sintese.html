<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 08 — Síntese / Urgência afetiva</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Nunito+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background-color: #F97316;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
  }

  .container {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 96px;
    position: relative;
  }

  .content {
    text-align: center;
    max-width: 900px;
  }

  /* Coração — símbolo de cuidado ativo */
  .icon-wrap {
    font-size: 80px;
    margin-bottom: 52px;
    opacity: 0.85;
  }

  .headline {
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 80px;
    line-height: 1.15;
    color: #FFFFFF;
    letter-spacing: -0.5px;
    margin-bottom: 52px;
  }

  .divider {
    width: 72px;
    height: 5px;
    background-color: rgba(255, 255, 255, 0.35);
    border-radius: 3px;
    margin: 0 auto 52px auto;
  }

  .body-text {
    font-family: 'Nunito Sans', sans-serif;
    font-weight: 500;
    font-size: 38px;
    line-height: 1.70;
    color: rgba(255, 255, 255, 0.92);
  }

  /* Logotipo no rodapé */
  .logo {
    position: absolute;
    bottom: 52px;
    right: 72px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-dot {
    width: 18px;
    height: 18px;
    background-color: #FFFFFF;
    border-radius: 50%;
    opacity: 0.65;
  }

  .logo-text {
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 26px;
    color: rgba(255, 255, 255, 0.55);
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="content">
      <!-- Laranja #F97316 — Urgência afetiva, cuidado ativo -->
      <!-- O laranja é usado com parcimônia neste carrossel — tem peso aqui -->
      <div class="icon-wrap">🤝</div>

      <h1 class="headline">Essa notícia vale para você. E para quem você conhece.</h1>

      <div class="divider"></div>

      <p class="body-text">
        Se você está em situação de violência<br>
        ou conhece alguém que está:<br><br>
        o apoio existe agora,<br>
        está mais próximo,<br>
        e é gratuito.<br><br>
        Guarda esse post.<br>Você pode precisar lembrar.
      </p>
    </div>

    <!-- Logotipo -->
    <div class="logo">
      <div class="logo-dot"></div>
      <span class="logo-text">Saúde Sync</span>
    </div>
  </div>
</body>
</html>
