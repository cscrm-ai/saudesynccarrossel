<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 05 — Como acessar</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Nunito+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background-color: #2BBFBF;
    display: flex;
    flex-direction: column;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
  }

  .container {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    padding: 100px 96px 80px 96px;
    position: relative;
  }

  .label {
    font-family: 'Nunito Sans', sans-serif;
    font-weight: 500;
    font-size: 28px;
    color: rgba(255, 255, 255, 0.50);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 48px;
  }

  .headline {
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 72px;
    line-height: 1.15;
    color: #FFFFFF;
    letter-spacing: -0.5px;
    margin-bottom: 72px;
    max-width: 820px;
  }

  /* Lista de passos */
  .steps {
    display: flex;
    flex-direction: column;
    gap: 48px;
    margin-bottom: 72px;
  }

  .step {
    display: flex;
    align-items: flex-start;
    gap: 36px;
  }

  /* Números em Laranja #F97316 — cor de ação */
  .step-number {
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 64px;
    color: #F97316;
    line-height: 1.0;
    min-width: 56px;
    margin-top: -4px;
  }

  .step-text {
    font-family: 'Nunito Sans', sans-serif;
    font-weight: 500;
    font-size: 38px;
    line-height: 1.5;
    color: rgba(255, 255, 255, 0.92);
    padding-top: 8px;
  }

  /* Rodapé da lista */
  .footer-note {
    font-family: 'Nunito Sans', sans-serif;
    font-weight: 500;
    font-size: 34px;
    line-height: 1.6;
    color: rgba(255, 255, 255, 0.75);
    border-top: 2px solid rgba(255, 255, 255, 0.20);
    padding-top: 40px;
  }

  /* Logotipo no rodapé */
  .logo {
    position: absolute;
    bottom: 52px;
    right: 72px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-dot {
    width: 18px;
    height: 18px;
    background-color: #F97316;
    border-radius: 50%;
  }

  .logo-text {
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 26px;
    color: rgba(255, 255, 255, 0.50);
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
  <div class="container">
    <!-- Teal #2BBFBF — Ação acessível, números em Laranja -->
    <div class="label">Passo a passo</div>

    <h1 class="headline">Como acessar em 3 passos simples.</h1>

    <div class="steps">
      <div class="step">
        <span class="step-number">1</span>
        <span class="step-text">Baixe o app <strong>Meu SUS Digital</strong><br>(gratuito, iOS e Android)</span>
      </div>

      <div class="step">
        <span class="step-number">2</span>
        <span class="step-text">Cadastre-se com<br><strong>CPF e data de nascimento</strong></span>
      </div>

      <div class="step">
        <span class="step-number">3</span>
        <span class="step-text">Solicite <strong>atendimento psicológico</strong><br>pelo celular</span>
      </div>
    </div>

    <p class="footer-note">
      Sem senha do governo.<br>
      Sem burocracia. Sem fila presencial.
    </p>

    <!-- Logotipo -->
    <div class="logo">
      <div class="logo-dot"></div>
      <span class="logo-text">Saúde Sync</span>
    </div>
  </div>
</body>
</html>
